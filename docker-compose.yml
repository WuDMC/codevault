version: "3.8"

services:
  # PostgreSQL — отдельный сервис
  # Может использоваться ЛЮБЫМИ приложениями, не только memory server
  postgres:
    image: pgvector/pgvector:pg18
    container_name: memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"  # Exposed — другие приложения могут подключаться!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memory-network

  # Memory MCP Server — отдельный сервис
  # Зависит от postgres, но это РАЗНЫЕ контейнеры
  memory-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-mcp-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # PostgreSQL connection (к отдельному сервису)
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/memory

      # OpenAI API key
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Server config
      MEMORY_HOME: /app/.memory
      MCP_TRANSPORT: sse
      MCP_PORT: 8420
      MCP_HOST: 0.0.0.0
    ports:
      - "8420:8420"  # SSE transport
    volumes:
      - memory-data:/app/.memory
    networks:
      - memory-network
    command: memory mcp --transport sse --port 8420 --host 0.0.0.0

  # (Optional) pgAdmin — для управления PostgreSQL через Web UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: memory-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: '1'
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: '1'
    ports:
      - "5050:80"  # Web UI via Nginx: https://pgadmin.wudmc.com
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - memory-network
    depends_on:
      - postgres

volumes:
  postgres-data:
    driver: local
  memory-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  memory-network:
    driver: bridge
